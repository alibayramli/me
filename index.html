    <script>
      ;(function () {
        try {
          var theme = window.localStorage.getItem('portfolio-theme')
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches

          document.documentElement.classList.toggle(
            'dark',
            theme === 'dark' || (theme !== 'light' && prefersDark),
          )
        } catch {}
      })()
    </script>
